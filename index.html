<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PPWR Compliance Assessment — ISA Digital Consulting</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Segoe UI',system-ui,sans-serif;background:#F2F6F9;min-height:100vh}
input,select,button{font-family:inherit}
#app{min-height:100vh}

/* HEADER */ 
/* in .hdr inserito
'''
display: none !important
'''
per nascondere l'header */
.hdr{display:none !important;background:#0B3041;padding:12px 24px;display:flex;align-items:center;justify-content:space-between}
.hdr img{height:32px;display:block}
.tag{background:#005E7C;color:#62BCD0;font-size:10px;font-weight:600;padding:3px 10px;border-radius:20px;letter-spacing:1px}

/* PROGRESS */
.prog-bar-wrap{background:#0B3041;padding:8px 24px 10px}
.prog-labels{display:flex;justify-content:space-between;margin-bottom:6px;font-size:11px;color:#8AABBE}
.prog-track{background:#005E7C;border-radius:20px;height:6px}
.prog-fill{height:6px;border-radius:20px;transition:width .4s;background:linear-gradient(90deg,#62BCD0,#0F9ED5)}

/* CARD */
.card{background:#fff;border-radius:12px;box-shadow:0 2px 16px rgba(11,48,65,.10);overflow:hidden}
.container{max-width:760px;margin:0 auto;padding:28px 20px}
.container-sm{max-width:620px;margin:0 auto;padding:40px 20px}
.container-md{max-width:720px;margin:0 auto;padding:40px 20px}
.container-lg{max-width:780px;margin:0 auto;padding:28px 20px}

/* SECTION HEADER */
.sec-hdr{padding:16px 24px;display:flex;align-items:center;justify-content:space-between}
.sec-hdr-left{display:flex;align-items:center;gap:10px}
.sec-hdr-icon{font-size:24px}
.sec-hdr-title{color:#fff;font-weight:800;font-size:16px}
.sec-hdr-ref{color:rgba(255,255,255,.7);font-size:11px;margin-top:2px}
.sec-hdr-right{color:rgba(255,255,255,.8);font-size:12px}

/* TABS */
.tabs{display:flex;border-bottom:1px solid #E8EEF3;overflow-x:auto}
.tab-btn{flex:1;min-width:60px;padding:8px 4px;border:none;cursor:pointer;font-size:11px;transition:all .15s;display:flex;flex-direction:column;align-items:center;gap:3px}
.tab-dot{width:6px;height:6px;border-radius:50%;background:#4EA72E;display:none}
.tab-dot.show{display:block}

/* QUESTION CARD */
.q-card{background:#fff;border-radius:12px;box-shadow:0 2px 16px rgba(11,48,65,.10);margin-bottom:16px;padding:24px}
.q-header{display:flex;gap:12px;margin-bottom:12px}
.q-num{min-width:28px;height:28px;border-radius:50%;font-weight:800;font-size:13px;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.q-text{flex:1}
.q-title{margin:0 0 4px;color:#0B3041;font-weight:600;font-size:14px;line-height:1.5}
.q-ref{font-size:11px;color:#8A9BB0;font-weight:500}
.badge-critico{background:rgba(234,0,72,.12);color:#EA0048;font-size:10px;font-weight:700;padding:1px 6px;border-radius:10px;margin-right:6px}
.options{display:flex;flex-direction:column;gap:8px}
.opt-label{display:flex;align-items:center;gap:10px;padding:10px 14px;border-radius:8px;cursor:pointer;transition:all .15s;border:1.5px solid #E0E8EE;background:#F8FAFB}
.opt-label:hover{border-color:#007FA3;background:#f0f8fc}
.opt-radio{display:none}
.opt-dot{width:16px;height:16px;border-radius:50%;flex-shrink:0;border:2px solid #C0CDD8;background:transparent;display:flex;align-items:center;justify-content:center}
.opt-dot-inner{width:6px;height:6px;border-radius:50%;background:#fff;display:none}
.opt-text{font-size:13px;color:#464D62;flex:1}
.opt-score{margin-left:auto;font-size:11px;font-weight:700;color:#C0CDD8}

/* BUTTONS */
.btn{border:none;border-radius:8px;padding:11px 28px;font-weight:700;font-size:14px;cursor:pointer;transition:opacity .15s}
.btn:hover{opacity:.88}
.btn:disabled{cursor:not-allowed;opacity:.6}
.btn-nav{display:flex;gap:12px;margin-top:8px;align-items:center}

/* FORM */
.form-grid-2{display:grid;grid-template-columns:1fr 1fr;gap:16px;margin-bottom:16px}
.form-group{margin-bottom:16px}
.form-label{font-size:12px;font-weight:600;color:#464D62;display:block;margin-bottom:4px}
.form-input{width:100%;border:1.5px solid #D1DCE5;border-radius:8px;padding:10px 14px;font-size:14px;outline:none}
.form-input:focus{border-color:#007FA3}
.form-input.err{border-color:#EA0048}
.form-error{color:#EA0048;font-size:11px;display:block;margin-top:3px}

/* WELCOME */
.welcome-stats{display:grid;grid-template-columns:repeat(3,1fr);gap:16px;margin-bottom:32px}
.stat-box{background:#F2F6F9;border-radius:10px;padding:16px 10px;text-align:center}
.stat-n{font-size:26px;font-weight:800;color:#007FA3}
.stat-l{font-size:12px;color:#464D62;margin-top:4px}
.sections-list{background:#F8FAFB;border-radius:10px;padding:16px 20px;margin-bottom:28px;text-align:left}
.sections-list p{margin:0 0 8px;font-size:13px;color:#464D62;font-weight:600}
.sec-pill-row{display:flex;align-items:center;gap:8px;margin-bottom:6px}
.sec-pill{display:inline-flex;align-items:center;gap:6px;border-radius:20px;padding:4px 14px;font-size:12px;font-weight:600}
.sec-ref{font-size:11px;color:#8A9BB0}

/* RESULTS */
.hero-score{padding:36px 32px;display:flex;align-items:center;gap:32px}
.hero-pct{text-align:center;min-width:100px}
.hero-pct-num{font-size:52px;font-weight:900;color:#fff;line-height:1}
.hero-pct-sub{color:#62BCD0;font-size:11px;margin-top:4px}
.hero-info{flex:1}
.hero-company{font-size:18px;font-weight:800;color:#fff;margin-bottom:6px}
.risk-badge{display:inline-block;color:#fff;font-weight:700;font-size:13px;padding:4px 16px;border-radius:20px;margin-bottom:10px}
.hero-desc{color:rgba(255,255,255,.7);font-size:13px;line-height:1.5}
.gaps-alert{border-top:2px solid rgba(234,0,72,.3);padding:12px 24px;display:flex;align-items:center;gap:10px;background:rgba(234,0,72,.06)}
.gaps-alert-icon{color:#EA0048;font-size:18px}
.gaps-alert-text{color:#EA0048;font-size:13px;font-weight:600}
.sec-grid{display:grid;grid-template-columns:1fr 1fr;gap:14px;margin-bottom:20px}
.sec-result-card{background:#fff;border-radius:12px;box-shadow:0 2px 16px rgba(11,48,65,.10);padding:18px}
.sec-result-top{display:flex;align-items:center;gap:8px;margin-bottom:10px}
.sec-result-icon{font-size:20px}
.sec-result-name{font-size:12px;font-weight:700;color:#0B3041}
.sec-result-ref{font-size:10px;color:#8A9BB0}
.sec-result-pct{font-size:18px;font-weight:800;margin-left:auto}
.bar-track{background:#E8EEF3;border-radius:20px;height:6px}
.bar-fill{height:6px;border-radius:20px;transition:width .6s}
.sec-result-bottom{display:flex;justify-content:space-between;margin-top:6px;font-size:11px}
.gaps-card{background:#fff;border-radius:12px;box-shadow:0 2px 16px rgba(11,48,65,.10);margin-bottom:20px;padding:24px}
.gaps-title{color:#EA0048;margin:0 0 16px;font-size:15px;font-weight:800}
.gap-item{display:flex;gap:12px;margin-bottom:12px;padding:12px 14px;background:rgba(234,0,72,.05);border-radius:8px;border:1px solid rgba(234,0,72,.15)}
.gap-num{color:#EA0048;font-weight:800;font-size:14px;min-width:22px}
.gap-section-badge{display:inline-block;background:rgba(234,0,72,.12);color:#EA0048;font-size:10px;font-weight:700;padding:2px 8px;border-radius:10px;margin-bottom:4px}
.gap-text{margin:0;font-size:12.5px;color:#0B3041;line-height:1.5}
.deadlines-card{background:#fff;border-radius:12px;box-shadow:0 2px 16px rgba(11,48,65,.10);margin-bottom:20px;padding:24px}
.deadlines-title{color:#0B3041;margin:0 0 16px;font-size:15px;font-weight:800}
.deadlines-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.deadline-item{display:flex;gap:10px;padding:10px 14px;border-radius:8px}
.deadline-date{color:#fff;border-radius:6px;padding:3px 8px;font-size:10px;font-weight:700;min-width:80px;text-align:center;flex-shrink:0;line-height:1.6}
.deadline-text{font-size:12px;color:#0B3041;font-weight:500;line-height:1.4}
.cta-card{border-radius:12px;box-shadow:0 2px 16px rgba(11,48,65,.10);padding:28px;text-align:center;margin-bottom:20px}
.cta-title{font-size:16px;font-weight:800;color:#fff;margin-bottom:8px}
.cta-desc{color:rgba(255,255,255,.75);font-size:13px;margin:0 0 20px}
.cta-btns{display:flex;gap:12px;justify-content:center;flex-wrap:wrap}
.privacy-note{text-align:center;margin-top:16px;font-size:11px;color:#9AAAB8}

@media(max-width:600px){
  .form-grid-2{grid-template-columns:1fr}
  .sec-grid{grid-template-columns:1fr}
  .deadlines-grid{grid-template-columns:1fr}
  .hero-score{flex-direction:column;text-align:center}
  .welcome-stats{grid-template-columns:1fr 1fr}
}
</style>
</head>

const MAX_SCORE = SECTIONS.reduce((t,s)=>t+s.questions.length*3,0); // 87

// ── Helpers ────────────────────────────────────────────────────────────────
function secScore(sid, ans){
  const s=SECTIONS.find(x=>x.id===sid);
  if(!s)return{score:0,max:0,pct:0};
  const max=s.questions.length*3;
  const score=s.questions.reduce((t,q)=>t+(ans[q.id]??0),0);
  return{score,max,pct:Math.round(score/max*100)};
}
function globalScore(ans){
  const score=Object.values(ans).reduce((t,v)=>t+v,0);
  return{score,pct:Math.round(score/MAX_SCORE*100)};
}
function riskLevel(pct){
  if(pct>=75)return{label:"Basso Rischio",color:C.green};
  if(pct>=45)return{label:"Rischio Moderato",color:C.amber};
  return{label:"Rischio Elevato",color:C.red};
}
function criticalGaps(ans){
  return SECTIONS.flatMap(s=>
    s.questions.filter(q=>q.risk&&(ans[q.id]??0)===0)
    .map(q=>({section:s.title,text:q.text,ref:q.ref}))
  );
}

async function sendLead(){
  const g=globalScore(state.answers);
  const risk=riskLevel(g.pct);
  const gaps=criticalGaps(state.answers);
  const secSum=SECTIONS.map(s=>{const r=secScore(s.id,state.answers);return `${s.title}: ${r.score}/${r.max} (${r.pct}%) — ${riskLevel(r.pct).label}`;}).join("\n");
  const gapsText=gaps.length?gaps.map((g,i)=>`${i+1}. [${g.section}] ${g.text} (${g.ref})`).join("\n"):"Nessun gap critico.";
  const f=state.form;
  const msg=`PPWR ASSESSMENT — ISA Digital Consulting\nReg. (UE) 2025/40\n\nLEAD\nNome: ${f.name}\nAzienda: ${f.company}\nRuolo: ${f.role}\nEmail: ${f.email}\nTelefono: ${f.phone}\nData: ${new Date().toLocaleDateString("it-IT")}\n\nRISULTATI GLOBALI\nPunteggio: ${g.score}/${MAX_SCORE} (${g.pct}%)\nLivello: ${risk.label}\n\nSEZIONI\n${secSum}\n\nGAP CRITICI\n${gapsText}`;
  try{
    await fetch("https://api.emailjs.com/api/v1.0/email/send",{
      method:"POST",headers:{"Content-Type":"application/json"},
      body:JSON.stringify({service_id:EJS_SERVICE,template_id:EJS_TEMPLATE,user_id:EJS_KEY,
        template_params:{to_name:"ISA Digital Consulting",from_name:`${f.name} — ${f.company}`,reply_to:f.email,message:msg}})
    });
  }catch(e){}
}

// ── Render helpers ───────────────────────────────────────────────────────────
function h(tag,attrs,...children){
  const el=document.createElement(tag);
  if(attrs)Object.entries(attrs).forEach(([k,v])=>{
    if(k==="style"&&typeof v==="object")Object.assign(el.style,v);
    else if(k.startsWith("on"))el.addEventListener(k.slice(2).toLowerCase(),v);
    else if(k==="className")el.className=v;
    else if(k==="disabled")el.disabled=!!v;
    else el.setAttribute(k,v);
  });
  children.flat(Infinity).forEach(c=>{
    if(c==null||c===false)return;
    el.appendChild(typeof c==="string"?document.createTextNode(c):c);
  });
  return el;
}
function $div(cls,style,...ch){return h("div",{className:cls,style},...ch);}

}

    stats.appendChild(b);
  });
  card.appendChild(stats);

  const sl=$div("sections-list");
  sl.appendChild(h("p",null,"📋 Il tool copre:"));
  SECTIONS.forEach(s=>{
    const row=$div("sec-pill-row");
    const pill=h("span",{className:"sec-pill",style:{background:s.color+"18",border:`1.5px solid ${s.color}40`,color:s.color}},s.icon+" "+s.title);
    row.appendChild(pill);
    row.appendChild(h("span",{className:"sec-ref"},s.ref));
    sl.appendChild(row);
  });
  card.appendChild(sl);

  const btn=h("button",{className:"btn",style:{background:C.teal3,color:"#fff"}},"Inizia l'Assessment →");
  btn.addEventListener("click",()=>setState({step:"form"}));
  card.appendChild(btn);
  cont.appendChild(card);
  cont.appendChild(h("p",{className:"privacy-note"},"I tuoi dati sono trattati esclusivamente per finalità di assessment da ISA Digital Consulting"));
  wrap.appendChild(cont);
  return wrap;
}

// ── FORM ─────────────────────────────────────────────────────────────────────
function renderForm(){
  const wrap=h("div",{style:{fontFamily:"inherit",background:"#F2F6F9",minHeight:"100vh"}});
  wrap.appendChild(renderHeader("PPWR ASSESSMENT"));
  const cont=$div("container-sm");
  const card=h("div",{className:"card",style:{padding:"36px"}});
  card.appendChild(h("h2",{style:{color:C.navy,fontSize:"22px",fontWeight:"800",margin:"0 0 6px"}},"Chi sei?"));
  card.appendChild(h("p",{style:{color:C.slate,fontSize:"13px",margin:"0 0 28px"}},"Inserisci i tuoi dati per accedere all'assessment e ricevere il report!"));

  const errors={};

  const grid=$div("form-grid-2");
  ["name","company"].forEach(key=>{
    const g=$div("form-group",{marginBottom:"0"});
    g.appendChild(h("label",{className:"form-label"},key==="name"?"Nome e Cognome *":"Azienda *"));
    const inp=h("input",{type:"text",className:"form-input",placeholder:key==="name"?"Mario Rossi":"Es. Caffè Esempio S.r.l.",id:"f_"+key,value:state.form[key]});
    inp.addEventListener("input",e=>state.form[key]=e.target.value);
    g.appendChild(inp);
    const err=h("span",{className:"form-error",id:"err_"+key,style:{display:"none"}});
    g.appendChild(err);
    grid.appendChild(g);
  });
  card.appendChild(grid);

  // Role select
  const rg=$div("form-group");
  rg.appendChild(h("label",{className:"form-label"},"Ruolo / Funzione *"));
  const sel=h("select",{className:"form-input",id:"f_role"});
  sel.appendChild(h("option",{value:""},"— Seleziona —"));
  ["CEO / Direzione Generale","Responsabile Acquisti / Supply Chain","Responsabile Legale / Compliance","Responsabile Qualità / Sostenibilità","Responsabile ESG / CSR","Responsabile Packaging","Consulente Esterno","Altro"].forEach(r=>{
    const o=h("option",{value:r},r);
    if(state.form.role===r)o.selected=true;
    sel.appendChild(o);
  });
  sel.addEventListener("change",e=>state.form.role=e.target.value);
  rg.appendChild(sel);
  rg.appendChild(h("span",{className:"form-error",id:"err_role",style:{display:"none"}}));
  card.appendChild(rg);

  const grid2=$div("form-grid-2");
  [{key:"email",label:"Email *",type:"email",ph:"mario@azienda.it"},{key:"phone",label:"Cellulare *",type:"tel",ph:"+39 333 000 0000"}].forEach(({key,label,type,ph})=>{
    const g=$div("form-group",{marginBottom:"0"});
    g.appendChild(h("label",{className:"form-label"},label));
    const inp=h("input",{type,className:"form-input",placeholder:ph,id:"f_"+key,value:state.form[key]});
    inp.addEventListener("input",e=>state.form[key]=e.target.value);
    g.appendChild(inp);
    g.appendChild(h("span",{className:"form-error",id:"err_"+key,style:{display:"none"}}));
    grid2.appendChild(g);
  });
  card.appendChild(grid2);

  const nav=$div("btn-nav",{marginTop:"28px"});
  const back=h("button",{className:"btn",style:{background:"#E8EEF3",color:C.slate}},"← Indietro");
  back.addEventListener("click",()=>setState({step:"welcome"}));
  const go=h("button",{className:"btn",style:{background:C.teal3,color:"#fff",flex:"2"}},"Avvia Assessment →");
  go.addEventListener("click",()=>{
    const f=state.form;
    let ok=true;
    [["name","Campo obbligatorio"],["company","Campo obbligatorio"],["role","Campo obbligatorio"],["email","Email non valida"],["phone","Campo obbligatorio"]].forEach(([k,msg])=>{
      const el=document.getElementById("f_"+k);
      const err=document.getElementById("err_"+k);
      const val=k==="email"?(/\S+@\S+\.\S+/.test(f[k])):f[k].trim();
      if(!val){el.classList.add("err");err.textContent=msg;err.style.display="block";ok=false;}
      else{el.classList.remove("err");err.style.display="none";}
    });
    if(ok)setState({step:"assessment",secIdx:0});
  });
  nav.appendChild(back);nav.appendChild(go);
  card.appendChild(nav);
  cont.appendChild(card);
  wrap.appendChild(cont);
  return wrap;
}

// ── ASSESSMENT ───────────────────────────────────────────────────────────────
function renderAssessment(){
  const wrap=h("div",{style:{fontFamily:"inherit",background:"#F2F6F9",minHeight:"100vh"}});
  wrap.appendChild(renderHeader("PPWR",state.form.company));

  // progress
  const totalQ=SECTIONS.reduce((t,s)=>t+s.questions.length,0);
  const totalAns=Object.keys(state.answers).length;
  const pct=Math.round(totalAns/totalQ*100);
  const pb=$div("prog-bar-wrap");
  const pl=$div("prog-labels");
  pl.appendChild(h("span",null,"Completamento assessment"));
  pl.appendChild(h("span",null,`${totalAns} / ${totalQ} domande`));
  pb.appendChild(pl);
  const pt=$div("prog-track");
  const pf=$div("prog-fill",{width:pct+"%"});
  pt.appendChild(pf);pb.appendChild(pt);
  wrap.appendChild(pb);

  const cont=$div("container");
  const sec=SECTIONS[state.secIdx];

  // section header card
  const shCard=$div("card",{marginBottom:"20px",overflow:"hidden"});
  const shHdr=$div("sec-hdr",{background:sec.color});
  const shl=$div("sec-hdr-left");
  shl.appendChild($div("sec-hdr-icon",null,sec.icon));
  const shd=h("div");
  shd.appendChild($div("sec-hdr-title",null,sec.title));
  shd.appendChild($div("sec-hdr-ref",null,sec.ref));
  shl.appendChild(shd);
  shHdr.appendChild(shl);
  shHdr.appendChild(h("div",{style:{color:"rgba(255,255,255,.8)",fontSize:"12px"}},`Sezione ${state.secIdx+1} di ${SECTIONS.length}`));
  shCard.appendChild(shHdr);

  // tabs
  const tabs=$div("tabs");
  SECTIONS.forEach((s,i)=>{
    const done=s.questions.every(q=>state.answers[q.id]!==undefined);
    const isActive=i===state.secIdx;
    const tb=h("button",{className:"tab-btn",style:{
      background:isActive?"#fff":"#F8FAFB",
      borderBottom:isActive?`3px solid ${s.color}`:"3px solid transparent",
      color:isActive?s.color:"#8A9BB0",fontWeight:isActive?"700":"400"
    }});
    tb.appendChild(h("span",null,s.icon));
    const dot=h("span",{className:"tab-dot"+(done?" show":"")});
    tb.appendChild(dot);
    tb.addEventListener("click",()=>setState({secIdx:i}));
    tabs.appendChild(tb);
  });
  shCard.appendChild(tabs);
  cont.appendChild(shCard);

  // questions
  sec.questions.forEach((q,qi)=>{
    const qc=$div("q-card");
    const qh=$div("q-header");
    const qn=h("span",{className:"q-num",style:{background:sec.color+"20",color:sec.color}},(qi+1).toString());
    const qt=h("div",{className:"q-text"});
    const qtitle=h("p",{className:"q-title"});
    if(q.risk){qtitle.appendChild(h("span",{className:"badge-critico"},"CRITICO"));}
    qtitle.appendChild(document.createTextNode(q.text));
    qt.appendChild(qtitle);
    qt.appendChild(h("span",{className:"q-ref"},q.ref));
    qh.appendChild(qn);qh.appendChild(qt);qc.appendChild(qh);

    const opts=$div("options");
    q.options.forEach(opt=>{
      const sel=state.answers[q.id]===opt.s;
      const optColor=sel?(opt.s===3?C.green:opt.s===1?C.amber:C.red):"#F8FAFB";
      const lbl=h("label",{className:"opt-label",style:{
        border:`1.5px solid ${sel?optColor:"#E0E8EE"}`,
        background:sel?optColor+"15":"#F8FAFB"
      }});
      const inp=h("input",{type:"radio",className:"opt-radio",name:"q_"+q.id});
      if(sel)inp.checked=true;
      inp.addEventListener("change",()=>{
        state.answers={...state.answers,[q.id]:opt.s};
        render();
      });
      const dot=h("span",{className:"opt-dot",style:{borderColor:sel?optColor:"#C0CDD8",background:sel?optColor:"transparent"}});
      if(sel){const inner=h("span",{className:"opt-dot-inner",style:{display:"block"}});dot.appendChild(inner);}
      const txt=h("span",{className:"opt-text",style:{color:sel?"#1A2535":C.slate,fontWeight:sel?"600":"400"}},opt.l);
      const score=h("span",{className:"opt-score",style:{color:sel?optColor:"#C0CDD8"}},opt.s+" pt");
      lbl.appendChild(inp);lbl.appendChild(dot);lbl.appendChild(txt);lbl.appendChild(score);
      opts.appendChild(lbl);
    });
    qc.appendChild(opts);
    cont.appendChild(qc);
  });

  // navigation
  const curDone=sec.questions.every(q=>state.answers[q.id]!==undefined);
  const allDone=totalAns===totalQ;
  const nav=$div("btn-nav");
  if(state.secIdx>0){
    const prev=h("button",{className:"btn",style:{background:"#E8EEF3",color:C.slate}},"← Precedente");
    prev.addEventListener("click",()=>setState({secIdx:state.secIdx-1}));
    nav.appendChild(prev);
  }
  nav.appendChild(h("div",{style:{flex:"1"}}));
  if(state.secIdx<SECTIONS.length-1){
    const next=h("button",{className:"btn",style:{background:curDone?C.teal3:"#B0C0CC",color:"#fff"},disabled:!curDone},"Prossima sezione →");
    if(curDone)next.addEventListener("click",()=>setState({secIdx:state.secIdx+1}));
    nav.appendChild(next);
  } else {
    const fin=h("button",{className:"btn",style:{background:allDone?C.green:"#B0C0CC",color:"#fff",fontWeight:"800"},disabled:!allDone},allDone?"✓ Visualizza Risultati":`Completa tutte le domande (${totalAns}/${totalQ})`);
    if(allDone)fin.addEventListener("click",()=>{setState({step:"results"});sendLead();});
    nav.appendChild(fin);
  }
  cont.appendChild(nav);
  wrap.appendChild(cont);
  return wrap;
}

// ── RESULTS ──────────────────────────────────────────────────────────────────
function renderResults(){
  const wrap=h("div",{style:{fontFamily:"inherit",background:"#F2F6F9",minHeight:"100vh"}});
  wrap.appendChild(renderHeader("REPORT PPWR"));
  const cont=$div("container-lg");
  const g=globalScore(state.answers);
  const gR=riskLevel(g.pct);
  const gaps=criticalGaps(state.answers);

  // Hero
  const heroCard=$div("card",{marginBottom:"20px",overflow:"hidden"});
  const hero=$div("hero-score",{background:`linear-gradient(135deg,${C.navy},${C.teal4})`});
  const hpct=$div("hero-pct");
  hpct.appendChild($div("hero-pct-num",null,g.pct+"%"));
  hpct.appendChild($div("hero-pct-sub",null,`${g.score} / ${MAX_SCORE} pt`));
  const hinfo=$div("hero-info");
  hinfo.appendChild($div("hero-company",null,`${state.form.company} — PPWR Assessment`));
  hinfo.appendChild(h("span",{className:"risk-badge",style:{background:gR.color}},gR.label.toUpperCase()));
  hinfo.appendChild(h("br"));
  const desc=g.pct>=75?"Il livello di conformità PPWR è buono. Consolidare le aree ancora parziali prima delle scadenze operative.":g.pct>=45?"Sono presenti aree di rischio rilevanti. È necessario un piano strutturato di adeguamento al PPWR.":"Il gap di conformità PPWR è significativo. È richiesta un'azione strutturata su tutte le aree critiche con priorità.";
  hinfo.appendChild($div("hero-desc",{marginTop:"8px"},desc));
  hero.appendChild(hpct);hero.appendChild(hinfo);
  heroCard.appendChild(hero);
  if(gaps.length){
    const ga=$div("gaps-alert");
    ga.appendChild($div("gaps-alert-icon",null,"⚠"));
    ga.appendChild($div("gaps-alert-text",null,`${gaps.length} gap critico${gaps.length>1?"i":""} rilevato${gaps.length>1?"i":""} — azioni prioritarie raccomandate`));
    heroCard.appendChild(ga);
  }
  cont.appendChild(heroCard);

  // Section scores grid
  const sg=$div("sec-grid");
  SECTIONS.forEach(s=>{
    const r=secScore(s.id,state.answers);const rl=riskLevel(r.pct);
    const c=$div("sec-result-card");
    const top=$div("sec-result-top");
    top.appendChild($div("sec-result-icon",null,s.icon));
    const info=h("div");
    info.appendChild($div("sec-result-name",null,s.title));
    info.appendChild($div("sec-result-ref",null,s.ref));
    top.appendChild(info);
    top.appendChild(h("div",{className:"sec-result-pct",style:{color:rl.color}},r.pct+"%"));
    const bt=$div("bar-track");
    bt.appendChild(h("div",{className:"bar-fill",style:{width:r.pct+"%",background:rl.color}}));
    const bot=$div("sec-result-bottom");
    bot.appendChild(h("span",{style:{color:rl.color,fontWeight:"600"}},rl.label));
    bot.appendChild(h("span",{style:{color:"#8A9BB0"}},`${r.score}/${r.max} pt`));
    c.appendChild(top);c.appendChild(bt);c.appendChild(bot);
    sg.appendChild(c);
  });
  cont.appendChild(sg);

  // Critical gaps
  if(gaps.length){
    const gc=$div("gaps-card");
    gc.appendChild(h("h3",{className:"gaps-title"},"⚠ Gap Critici da Presidiare"));
    gaps.forEach((gap,i)=>{
      const gi=$div("gap-item");
      gi.appendChild($div("gap-num",null,(i+1)+"."));
      const gd=h("div");
      gd.appendChild(h("span",{className:"gap-section-badge"},gap.section+" • "+gap.ref));
      gd.appendChild(h("br"));
      gd.appendChild(h("p",{className:"gap-text"},gap.text));
      gi.appendChild(gd);
      gc.appendChild(gi);
    });
    cont.appendChild(gc);
  }

  // Deadlines
  const dc=$div("deadlines-card");
  dc.appendChild(h("h3",{className:"deadlines-title"},"📅 Scadenze Chiave PPWR"));
  const dg=$div("deadlines-grid");
  [
    {d:"12 ago 2026",t:"Limitazione PFAS — imballaggi a contatto con alimenti (Art. 5)",c:C.red},
    {d:"12 feb 2027",t:"Obbligo ricarica HoReCa — contenitori cibo e bevande (Art. 28)",c:C.teal3},
    {d:"12 ago 2028",t:"Etichettatura armonizzata obbligatoria con dettagli materiale (Art. 12)",c:C.teal3},
    {d:"1 gen 2030",t:"Restrizioni monouso + PCR 30% + spazio vuoto ≤50% + riciclabilità A/B/C",c:C.red},
  ].forEach(item=>{
    const di=h("div",{className:"deadline-item",style:{background:item.c+"10",border:`1px solid ${item.c}30`}});
    di.appendChild(h("span",{className:"deadline-date",style:{background:item.c}},item.d));
    di.appendChild($div("deadline-text",null,item.t));
    dg.appendChild(di);
  });
  dc.appendChild(dg);cont.appendChild(dc);

  // CTA
  const cta=$div("cta-card",{background:`linear-gradient(135deg,${C.navy},${C.teal4})`});
  cta.appendChild($div("cta-title",null,"Vuoi un supporto strutturato per la conformità PPWR?"));
  cta.appendChild(h("p",{className:"cta-desc"},"ISA Digital Consulting offre percorsi di advisory integrati: dalla gap analysis all'implementazione digitale, dalla Dichiarazione di Conformità UE alla gestione EPR e reporting di sostenibilità."));
  const ctaB=$div("cta-btns");
  const pdfBtn=h("button",{className:"btn",style:{background:state.jsPdfReady?"#fff":"#B0C4CE",color:state.jsPdfReady?C.navy:"#8A9BB0"}},"↓ Scarica Report PDF");
  if(state.jsPdfReady)pdfBtn.addEventListener("click",generatePDF);
  const newBtn=h("button",{className:"btn",style:{background:C.teal3,color:"#fff"}},"↺ Nuovo Assessment");
  newBtn.addEventListener("click",()=>setState({step:"welcome",secIdx:0,answers:{},emailSent:false}));
  ctaB.appendChild(pdfBtn);ctaB.appendChild(newBtn);
  cta.appendChild(ctaB);
  cont.appendChild(cta);
  wrap.appendChild(cont);
  return wrap;
}

// ── HEADER ────────────────────────────────────────────────────────────────────
function renderHeader(tag,company){
  const hdr=$div("hdr");
  const logo=h("img",{src:LOGO,alt:"ISA Digital Consulting",style:{height:"32px",display:"block"}});
  hdr.appendChild(logo);
  const right=h("div",{style:{display:"flex",alignItems:"center",gap:"12px"}});
  if(company)right.appendChild(h("span",{style:{color:"#8AABBE",fontSize:"12px"}},company));
  right.appendChild(h("span",{className:"tag"},tag));
  hdr.appendChild(right);
  return hdr;
}

// ── BOOT ─────────────────────────────────────────────────────────────────────
if(!window.jspdf){
  const s=document.createElement("script");
  s.src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js";
  s.onload=()=>{state.jsPdfReady=true;render();};
  document.head.appendChild(s);
}
render();
</script>
